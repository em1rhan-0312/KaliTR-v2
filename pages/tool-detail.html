  <script src="../js/main.js"></script>
  <script>
    // ─── TOOL DETAIL ───
    const params = new URLSearchParams(window.location.search);
    const toolId = params.get('tool');
    const container = document.getElementById('toolDetail');

    if (!toolId || !getToolById(toolId)) {
      container.innerHTML = `
        <div style="text-align:center;padding:80px 20px">
          <i class="fas fa-exclamation-triangle" style="font-size:48px;color:var(--orange);margin-bottom:16px"></i>
          <h1 style="margin-bottom:12px">Araç Bulunamadı</h1>
          <p style="color:var(--text-dim);margin-bottom:24px">Aradığınız araç mevcut değil veya yanlış bir bağlantı kullandınız.</p>
          <a href="tools.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Araçlara Dön</a>
        </div>
      `;
    } else {
      const tool = getToolById(toolId);

      const features = tool.features.map(f => `<li>${f}</li>`).join('');
      const tags = tool.tags.map(tag =>
        `<span class="tag ${tool.tagColor || ''}">${tag}</span>`
      ).join('');

      const usageHtml = tool.usage.map(u => `
        <div class="code-block">
          <div class="code-header">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            <span class="lang">${u.title}</span>
          </div>
          <pre><code>${u.code}</code></pre>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="breadcrumb" style="display:flex;gap:8px;align-items:center;margin-bottom:24px;font-size:14px;color:var(--text-muted)">
          <a href="../index.html" style="color:var(--text-dim);text-decoration:none">Ana Sayfa</a>
          <i class="fas fa-chevron-right" style="font-size:10px"></i>
          <a href="tools.html" style="color:var(--text-dim);text-decoration:none">Araçlar</a>
          <i class="fas fa-chevron-right" style="font-size:10px"></i>
          <span style="color:var(--primary)">${tool.name}</span>
        </div>

        <div class="tool-detail-header">
          <div class="detail-icon" style="background:${tool.bg};color:${tool.color}">
            <i class="fas ${tool.icon}"></i>
          </div>
          <div class="detail-info">
            <h1>${tool.name}</h1>
            <p style="color:var(--text-dim);margin-bottom:12px">${tool.desc}</p>
            <div class="detail-tags">${tags}</div>
          </div>
        </div>

        <div class="tool-detail-body">
          <p style="font-size:16px;line-height:1.8">${tool.fullDesc}</p>

          <h2><i class="fas fa-check-circle"></i> Özellikler</h2>
          <ul>${features}</ul>

          <h2><i class="fas fa-download"></i> Kurulum</h2>
          <div class="code-block">
            <div class="code-header">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
              <span class="lang">Terminal</span>
            </div>
            <pre><code><span class="prompt">$</span> ${tool.install}</code></pre>
          </div>

          <div class="info-box info">
            <i class="fas fa-info-circle"></i>
            <p><strong>Not:</strong> Kali Linux'da çoğu araç önceden yüklenmiş olarak gelir. Eksik olması durumunda yukarıdaki komut ile kurabilirsiniz.</p>
          </div>

          <h2><i class="fas fa-terminal"></i> Kullanım Örnekleri</h2>
          ${usageHtml}

          <div class="info-box warning">
            <i class="fas fa-shield-halved"></i>
            <p><strong>Yasal Uyarı:</strong> Bu araçları yalnızca kendi sistemlerinizde veya yazılı izin aldığınız sistemlerde kullanın. İzinsiz kullanım yasa dışıdır.</p>
          </div>
        </div>

        <div style="text-align:center;margin-top:48px;padding-top:32px;border-top:1px solid var(--border)">
          <div id="relatedTools" style="margin-bottom:32px">
            <h2 style="font-size:22px;font-weight:700;margin-bottom:20px;text-align:center"><i class="fas fa-link"></i> Benzer Araçlar</h2>
            <div class="featured-tools" id="relatedToolsGrid"></div>
          </div>
          <a href="tools.html" class="btn btn-outline">
            <i class="fas fa-arrow-left"></i> Tüm Araçlara Dön
          </a>
        </div>
      `;

      // ─── RELATED TOOLS ───
      const related = toolsData
        .filter(t => t.id !== tool.id && t.cat.some(c => tool.cat.includes(c)))
        .slice(0, 8);
      if (related.length > 0) {
        setToolsBasePath('tool-detail.html');
        renderTools(document.getElementById('relatedToolsGrid'), related);
      } else {
        document.getElementById('relatedTools').style.display = 'none';
      }
    }
  </script>
</body>
